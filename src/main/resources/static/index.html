<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty Dex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .pokedex-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .pokedex-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(78, 240, 56, 0.4);
            border-color: #4ef038;
        }

        .card-img-top { height: 250px; object-fit: cover; }

        .modal-content {
            border: 2px solid #4ef038;
            box-shadow: 0 0 40px rgba(78, 240, 56, 0.5);
        }
        .modal-body img {
            border-radius: 10px;
            border: 3px solid #3c3e44;
        }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container py-5">
    <h1 class="text-center mb-5 fw-bold text-success text-uppercase" style="letter-spacing: 2px;">
        Rick and Morty Dex
    </h1>

    <div class="d-flex justify-content-between align-items-center mb-4 bg-dark p-3 rounded-3 border border-secondary shadow-sm">
        <button id="btnAnterior" class="btn btn-outline-success fw-bold" onclick="mudarPagina(-1)">
            &laquo; Voltar
        </button>
        <span id="contadorPagina" class="fs-5 fw-semibold text-light">Página ...</span>
        <button id="btnProximo" class="btn btn-outline-success fw-bold" onclick="mudarPagina(1)">
            Avançar &raquo;
        </button>
    </div>

    <div class="row g-4" id="pokedex">
        <div class="text-center w-100 py-5">
            <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="mt-3 text-secondary">Acessando portal...</p>
        </div>
    </div>

    <p class="text-center text-secondary mt-5 small">Cidadela API v1.0 | Dados by Rick and Morty API</p>
</div>

<div class="modal fade" id="fichaModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
    <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content bg-dark text-white">

        <div class="modal-header border-secondary">
            <h1 class="modal-title fs-3 fw-bold text-success" id="modalNome">Nome do Personagem</h1>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body p-4">
            <div class="row align-items-center">
                <div class="col-md-5 text-center mb-3 mb-md-0">
                    <img src="" id="modalImagem" class="img-fluid shadow" alt="Foto">
                </div>

                <div class="col-md-7">
                    <ul class="list-group list-group-flush bg-transparent">
                        <li class="list-group-item bg-transparent text-white border-secondary">
                            <strong class="text-success">Status:</strong>
                            <span id="modalStatus" class="fw-bold fs-5"></span>
                        </li>
                        <li class="list-group-item bg-transparent text-white border-secondary">
                            <strong class="text-success">Espécie:</strong>
                            <span id="modalEspecie"></span>
                            <span id="modalTipo" class="text-secondary small"></span>
                        </li>
                        <li class="list-group-item bg-transparent text-white border-secondary">
                            <strong class="text-success">Gênero:</strong>
                            <span id="modalGenero"></span>
                        </li>
                        <li class="list-group-item bg-transparent text-white border-secondary">
                            <strong class="text-success">Origem:</strong>
                            <span id="modalOrigem"></span>
                        </li>
                        <li class="list-group-item bg-transparent text-white border-secondary">
                            <strong class="text-success">Última Localização:</strong>
                            <span id="modalLocal"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let paginaAtual = 1;
    let totalPaginas = 1;
    let personagensDaPagina = []; // Guardamos a lista completa para usar no hover

    const modalFicha = new bootstrap.Modal(document.getElementById('fichaModal'), {
        keyboard: false,
        focus: false // Impede que o modal "roube" o foco e trave o scroll
    });

    async function carregarCatalogo(pagina) {
        try {
            const resposta = await fetch(`http://localhost:8080/catalogo?pagina=${pagina}`);
            const dados = await resposta.json();

            totalPaginas = dados.info.pages;
            // Salva a lista de personagens para consulta no JavaScript
            personagensDaPagina = dados.results;

            document.getElementById('contadorPagina').innerText = `Página ${paginaAtual} de ${totalPaginas}`;
            const desabilitarAnterior = (paginaAtual === 1);
            const desabilitarProximo = (paginaAtual === totalPaginas);
            document.getElementById('btnAnterior').disabled = desabilitarAnterior;
            document.getElementById('btnProximo').disabled = desabilitarProximo;

            const container = document.getElementById('pokedex');
            container.innerHTML = '';

            // Passamos o index (i) para saber qual personagem foi clicado/hovered
            personagensDaPagina.forEach((personagem, i) => {
                let corBadge = "bg-secondary";
                if(personagem.status === "Alive") corBadge = "bg-success";
                if(personagem.status === "Dead") corBadge = "bg-danger";

                const cardHTML = `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="card h-100 bg-dark text-white border-secondary pokedex-card"
                             onmouseenter="abrirFichaMaior(${i})"
                             onmouseleave="fecharFichaMaior()">

                            <img src="${personagem.image}" class="card-img-top border-bottom border-secondary" alt="${personagem.name}">
                            <div class="card-body text-center p-2">
                                <h6 class="card-title fw-bold m-0 text-truncate">${personagem.name}</h6>
                                <span class="badge ${corBadge} small">${personagem.status}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

        } catch (erro) {
            console.error("Erro:", erro);
            document.getElementById('pokedex').innerHTML = '<div class="alert alert-danger w-100 text-center">Portal instável. O Java está rodando?</div>';
        }
    }


    function abrirFichaMaior(index) {
        const p = personagensDaPagina[index];

        document.getElementById('modalNome').innerText = p.name;
        document.getElementById('modalImagem').src = p.image;
        document.getElementById('modalEspecie').innerText = p.species;
        document.getElementById('modalGenero').innerText = translateGender(p.gender);
        document.getElementById('modalOrigem').innerText = p.origin.name;
        document.getElementById('modalLocal').innerText = p.location.name;

        const campoTipo = document.getElementById('modalTipo');
        campoTipo.innerText = p.type ? `(${p.type})` : '';

        const campoStatus = document.getElementById('modalStatus');
        campoStatus.innerText = p.status;
        campoStatus.className = 'fw-bold fs-5'; // limpa cores anteriores
        if(p.status === "Alive") campoStatus.classList.add('text-success');
        else if(p.status === "Dead") campoStatus.classList.add('text-danger');
        else campoStatus.classList.add('text-secondary');

        modalFicha.show();
    }

    function fecharFichaMaior() {
        // Manda o Bootstrap esconder o Modal
        modalFicha.hide();
    }

    function translateGender(g) {
        if(g === 'Male') return 'Macho';
        if(g === 'Female') return 'Fêmea';
        if(g === 'Genderless') return 'Sem Gênero';
        return 'Desconhecido';
    }

    function mudarPagina(direcao) {
        paginaAtual += direcao;
        carregarCatalogo(paginaAtual);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    carregarCatalogo(paginaAtual);
</script>
</body>
</html>
